name: Data Snapshots

on:
  schedule:
    # Airport congestion: every hour during US daytime (11:00-04:00 UTC = 6am-11pm ET)
    - cron: '0 11-23,0-4 * * *'
    # Daily data refresh (earthquakes, wildfires, AQ, FEC): 7am ET = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - airport
          - data-viz

jobs:
  airport-congestion:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.job == 'both' || inputs.job == 'airport')
      || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install duckdb==1.4.4 requests
      - name: Take airport congestion snapshot
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python snapshot.py

  data-viz-daily:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.job == 'both' || inputs.job == 'data-viz')
      || (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install duckdb==1.4.4 requests
      - name: Run daily data snapshot
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python pipelines/data_viz_snapshot.py
