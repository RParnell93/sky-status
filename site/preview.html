<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; padding:0; width:1200px; height:630px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #00234B 0%, #003366 100%); font-family:'Inter','Helvetica Neue',sans-serif; overflow:hidden; }
  .card { text-align:center; }
  .icon { font-size:80px; margin-bottom:10px; }
  .title { font-size:72px; font-weight:900; color:#fff; letter-spacing:4px; text-transform:uppercase; margin-bottom:8px; }
  .live { display:inline-block; background:#C8102E; color:#fff; font-size:20px; font-weight:700; padding:6px 16px; border-radius:6px; letter-spacing:2px; margin-bottom:20px; }
  .subtitle { font-size:28px; color:#8B9DAF; font-weight:500; letter-spacing:0.5px; }
  .stats { display:flex; gap:40px; justify-content:center; margin-top:36px; }
  .stat { text-align:center; }
  .stat-val { font-size:48px; font-weight:900; color:#fff; font-family:'JetBrains Mono',monospace; }
  .stat-label { font-size:14px; color:#8B9DAF; text-transform:uppercase; letter-spacing:2px; margin-top:4px; }
  .bar { width:1200px; height:4px; background:#C8102E; position:absolute; top:0; left:0; }
</style>
</head>
<body>
<div class="bar"></div>
<div class="card">
  <div class="icon">&#9992;</div>
  <div class="title">SKY STATUS</div>
  <div class="live">LIVE</div>
  <div class="subtitle">Real-time US airport congestion tracker</div>
  <div class="stats">
    <div class="stat"><div class="stat-val">30</div><div class="stat-label">Airports</div></div>
    <div class="stat"><div class="stat-val">7,000+</div><div class="stat-label">Aircraft Tracked</div></div>
    <div class="stat"><div class="stat-val">2hr</div><div class="stat-label">Snapshots</div></div>
  </div>
</div>
</body>
</html>
